# Perfil activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=backend

# Configuración de JPA / Hibernate (Se comparte en cualquier perfil)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.test.backend.shared.infrastructure.persistence.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Propiedades compartidas de Base de Datos y MQTT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
mqtt.topic=safelab/#

# JWT Configuration
authorization.jwt.expiration.days=50

# CORS Configuration
cors.allowed-origins=http://localhost:4200,https://*.vercel.app

server.port=${PORT:8080}
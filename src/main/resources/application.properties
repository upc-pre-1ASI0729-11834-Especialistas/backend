spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/safelab?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Esto creará las tablas automáticamente basándose en tus entidades de Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.test.backend.shared.infrastructure.persistence.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy